<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=yes, maximum-scale=9, minimum-scale=0.01">
  <title>Catálogo de Productos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .buscador input {
      width: 400px;
      height: auto;
      padding: 10px;
      margin: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #ccc;
      flex-direction: column;
    }

    .acciones {
      text-align: center;
      margin: 15px 0;
    }

    .acciones button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 2fr));
      gap: 15px;
      margin-top: 20px;
    }
      .producto {
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  width: 400px;      
  height: auto;
}

.producto img {
  width: 300px;
  height: auto;

  object-fit: contain;
  display: block;
  margin: 0 auto 10px auto;
}

     .producto button {
      margin-top: auto;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }

    .carrito {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 300px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    .cliente input,
    .cliente textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 6px;
    }

    @media(max-width:768px){
      .carrito{
        position: static;
        width: 100%;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>

<h1>Catálogo de Productos</h1>

<div class="buscador">
  <input type="text" id="busqueda" placeholder="Buscar producto..." oninput="filtrarProductos()">
</div>

<div class="acciones">
  <button onclick="window.print()">Imprimir</button>
</div>

<div class="grid" id="productos"></div>

<div class="carrito">
  <h3>Carrito</h3>
  <ul id="carrito"></ul>
  <p><strong>Total:</strong> $<span id="total">0.00</span></p>
  <button onclick="vaciarCarrito()">Vaciar</button>

  <div class="cliente">
    <h4>Cliente</h4>
    <input type="text" placeholder="Nombre">
    <input type="text" placeholder="Teléfono">
    <textarea placeholder="Observaciones"></textarea>
  </div>
</div>

<script>
const supabaseUrl = "https://yliohprzqxzpyyrpvlvh.supabase.co";
const supabaseKey = "sb_publishable_jWnZtBxthINwZnn2NDS6wg_wour17Cc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let productosOriginales = [];
let carrito = [];

async function cargarProductos() {
  const { data, error } = await client
    .from("productos")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  productosOriginales = data;
  mostrarProductos(data);
}

function mostrarProductos(productos) {
  const contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  productos.forEach(prod => {
    const div = document.createElement("div");
    div.className = "producto";

    div.innerHTML = `
      <img src="${prod.imagen_url || ''}">
      <h3>${prod.nombre}</h3>
      <p>${prod.descripcion || ''}</p>
      <p><strong>$${Number(prod.precio).toFixed(2)}</strong></p>
      <button onclick="agregarAlCarrito(${prod.id})">Agregar</button>
    `;

    contenedor.appendChild(div);
  });
}

function filtrarProductos() {
  const texto = document.getElementById("busqueda").value.toLowerCase();

  const filtrados = productosOriginales.filter(p =>
    p.nombre.toLowerCase().includes(texto) ||
    (p.descripcion || "").toLowerCase().includes(texto)
  );

  mostrarProductos(filtrados);
}

function agregarAlCarrito(id) {
  const producto = productosOriginales.find(p => p.id === id);

  const existe = carrito.find(p => p.id === id);

  if (existe) {
    existe.cantidad++;
  } else {
    carrito.push({...producto, cantidad: 1});
  }

  actualizarCarrito();
}

function actualizarCarrito() {
  const lista = document.getElementById("carrito");
  const total = document.getElementById("total");

  lista.innerHTML = "";
  let suma = 0;

  carrito.forEach((item, index) => {
    const subtotal = item.precio * item.cantidad;
    suma += subtotal;

    lista.innerHTML += `
      <li>
        ${item.nombre} x ${item.cantidad}
        <button onclick="cambiarCantidad(${index}, -1)">-</button>
        <button onclick="cambiarCantidad(${index}, 1)">+</button>
      </li>
    `;
  });

  total.textContent = suma.toFixed(2);
}

function cambiarCantidad(index, cambio) {
  carrito[index].cantidad += cambio;

  if (carrito[index].cantidad <= 0) {
    carrito.splice(index, 1);
  }

  actualizarCarrito();
}

function vaciarCarrito() {
  carrito = [];
  actualizarCarrito();
}

cargarProductos();
</script>

</body>
</html>
