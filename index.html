<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Productos</title>
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="https://raw.githubusercontent.com/AKATOYO/catalogo-app/refs/heads/main/style.css">
    <style>
/* styles.css */
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f4f4f4;
}
h1 {
    color: #333;
}
.productostable *{
    width: 100%;
    margin-top: 20px;
    border: 1px solid black;
    padding: 8px;
}
.productostable th, td *{
    border: 1px solid #ddd;
    padding: 12px;
    text-align: left;
    background-color: #F54927;
}
.productostabla th {
    background-color: #4CAF50;
    color: white;
}
.productostabla tr:nth-child(even) {
    background-color: #f2f2f2;
}
.productostabla img {
    max-width: 100px;
    height: auto;
}
</style>

</head>
<body>
   <h1>Catálogo de Productos</h1>

  <div class="buscador">
    <input type="text" id="busqueda" placeholder="🔍 Buscar producto..." oninput="filtrarProductos()" />
  </div>
    

  <div class="acciones">
    <button onclick="window.print()">🖨️ Imprimir Productos</button>
  </div>

  <div class="grid" id="productos"></div>

  <div class="carrito">
    <h3>🛒 Carrito</h3>
    <ul id="carrito"></ul>
    <p><strong>Total:</strong> $<span id="total">0.00</span></p>
    <button onclick="vaciarCarrito()">🗑️ Vaciar carrito</button>

    <div class="cliente">
      <h4>🧍 Cliente</h4>
      <input type="text" id="nombreCliente" placeholder="Nombre">
      <input type="text" id="telefonoCliente" placeholder="Teléfono">
      <textarea id="observacionesCliente" placeholder="Observaciones" rows="3"></textarea>
    </div>
  </div>

    
    <table class="productostable">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Imagen</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los datos se insertarán aquí por JavaScript -->
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
