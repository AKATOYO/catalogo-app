<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Productos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .buscador {
      text-align: center; /* Centra el contenedor del input */
      margin-bottom: 20px;
    }

    .buscador input {
      width: 80%; /* Ocupa más ancho en pantallas pequeñas */
      max-width: 400px; /* Limita el ancho máximo */
      height: auto;
      padding: 10px;
      display: inline-block; /* Permite centrar con text-align: center en el padre */
      border-radius: 8px;
      border: 1px solid #ccc;
      /* Eliminado: flex-direction: column; - No es necesario ni apropiado aquí */
    }

    .acciones {
      text-align: center;
      margin: 15px 0;
    }

    .acciones button {
      padding: 10px 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .acciones button:hover {
        background: #0056b3;
    }

    .grid {
      display: grid;
      /* Ajuste para que los items del grid se adapten mejor */
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* Minimo 220px, se expande */
      gap: 20px; /* Mayor espacio entre items */
      margin-top: 20px;
      padding: 0 10px; /* Padding para que no se pegue a los bordes */
    }

   .producto {
      /* Eliminado: width: 250px;; (doble punto y coma) y width: 250px;; */
      background: white;
      border: 1px solid #e0e0e0; /* Borde más suave */
      border-radius: 10px;
      padding: 15px; /* Más padding interno */
      box-shadow: 0 4px 8px rgba(0,0,0,0.05); /* Sombra más sutil */
      display: flex; /* Habilitar flexbox */
      flex-direction: column; /* Apilar elementos verticalmente */
      justify-content: space-between; /* Espacio entre contenido y botón */
      text-align: center;
      overflow: hidden; /* Para asegurar que los bordes redondeados se apliquen bien */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .producto:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .producto img {
      max-width: 100%; /* Asegura que la imagen no se salga del contenedor */
      height: 150px; /* Altura fija para las imágenes */
      object-fit: contain; /* Mantiene la proporción */
      display: block;
      margin: 0 auto 10px auto; /* Más margen inferior */
      border-radius: 5px; /* Bordes redondeados para la imagen */
    }

    .producto h3 {
        font-size: 1.1em;
        margin-bottom: 8px;
        color: #333;
    }

    .producto p {
        font-size: 0.9em;
        color: #666;
        margin-bottom: 10px;
        flex-grow: 1; /* Permite que el párrafo ocupe el espacio disponible */
    }

    .producto p strong {
        font-size: 1.2em;
        color: #007bff;
    }

     .producto button {
      /* margin-top: auto; <- Ahora funciona porque .producto es flex column */
      padding: 10px 15px; /* Botón más grande */
      border: none;
      border-radius: 6px;
      background: #28a745;
      color: white;
      cursor: pointer;
      font-size: 1em;
      transition: background-color 0.3s ease;
      margin-top: 10px; /* Espacio entre el texto y el botón */
    }
    .producto button:hover {
        background: #218838;
    }

    .carrito {
      position: sticky; /* Cambiado a sticky para que se mueva con el scroll pero se quede pegado */
      right: 10px;
      top: 10px; /* Se queda pegado arriba */
      width: 300px;
      background: white;
      padding: 15px; /* Más padding */
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1); /* Sombra más pronunciada */
      max-height: calc(90vh - 20px); /* Ajuste para el padding */
      overflow-y: auto;
      border: 1px solid #e0e0e0;
    }

    .carrito h3 {
        margin-top: 0;
        text-align: center;
        color: #333;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .carrito ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .carrito li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px dashed #eee;
        font-size: 0.95em;
    }
    .carrito li:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }

    .carrito li button {
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        font-size: 0.8em;
        margin-left: 5px;
    }
     .carrito li button:hover {
        background: #c82333;
    }

    .carrito p {
        width: 25px;
        object-fit: contain;
        font-size: 1.1em;
        text-align: right;
        margin-top: 15px;
        border-top: 1px solid #eee;
        padding-top: 10px;
    }

    .carrito button:last-of-type { /* Botón de vaciar */
        width: 100%;
        background: #ffc107;
        color: #333;
        margin-top: 15px;
        padding: 10px;
        border-radius: 6px;
    }
    .carrito button:last-of-type:hover {
        background: #e0a800;
    }

    .cliente {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    .cliente h4 {
        margin-top: 0;
        text-align: center;
        color: #333;
        margin-bottom: 15px;
    }

    .cliente input,
    .cliente textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px; /* Más padding */
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95em;
    }
    .cliente textarea {
        resize: vertical; /* Permite redimensionar verticalmente */
        min-height: 80px;
    }

    @media(max-width:768px){
      .carrito{
        position: static; /* Se vuelve estático en pantallas pequeñas */
        width: 100%;
        margin-top: 20px;
        margin-bottom: 20px; /* Espacio debajo del carrito */
      }
      .grid {
          grid-template-columns: 1fr; /* Una sola columna en pantallas pequeñas */
      }
      .buscador input {
          width: 95%; /* Ocupa casi todo el ancho */
      }
    }
  </style>
</head>
<body>

<h1>Catálogo de Productos</h1>

<div class="buscador">
  <input type="text" id="busqueda" placeholder="Buscar producto..." oninput="filtrarProductos()">
</div>

<div class="acciones">
  <button onclick="window.print()">Imprimir</button>
</div>

<div class="grid" id="productos"></div>

<div class="carrito">
  <h3>Carrito</h3>
  <ul id="carrito"></ul>
  <p><strong>Total:</strong> $<span id="total">0.00</span></p>
  <button onclick="vaciarCarrito()">Vaciar</button>

  <div class="cliente">
    <h4>Cliente</h4>
    <input type="text" placeholder="Nombre">
    <input type="text" placeholder="Teléfono">
    <textarea placeholder="Observaciones"></textarea>
  </div>
</div>

<script>
const supabaseUrl = "https://yliohprzqxzpyyrpvlvh.supabase.co";
const supabaseKey = "sb_publishable_jWnZtBxthINwZnn2NDS6wg_wour17Cc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let productosOriginales = [];
let carrito = [];

async function cargarProductos() {
  const { data, error } = await client
    .from("productos")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  productosOriginales = data;
  mostrarProductos(data);
}

function mostrarProductos(productos) {
  const contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  productos.forEach(prod => {
    const div = document.createElement("div");
    div.className = "producto";

    div.innerHTML = `
      <img src="${prod.imagen_url || ''}">
      <h3>${prod.nombre}</h3>
      <p>${prod.descripcion || ''}</p>
      <p><strong>$${Number(prod.precio).toFixed(2)}</strong></p>
      <button onclick="agregarAlCarrito(${prod.id})">Agregar</button>
    `;

    contenedor.appendChild(div);
  });
}

function filtrarProductos() {
  const texto = document.getElementById("busqueda").value.toLowerCase();

  const filtrados = productosOriginales.filter(p =>
    p.nombre.toLowerCase().includes(texto) ||
    (p.descripcion || "").toLowerCase().includes(texto)
  );

  mostrarProductos(filtrados);
}

function agregarAlCarrito(id) {
  const producto = productosOriginales.find(p => p.id === id);

  const existe = carrito.find(p => p.id === id);

  if (existe) {
    existe.cantidad++;
  } else {
    carrito.push({...producto, cantidad: 1});
  }

  actualizarCarrito();
}

 function quitarDelCarrito(indice) {
      carrito.splice(indice, 1);
      actualizarCarrito();
      guardarCarrito();
  }

function actualizarCarrito() {
  const lista = document.getElementById("carrito");
  const total = document.getElementById("total");

  lista.innerHTML = "";
  let suma = 0;

  carrito.forEach((item, index) => {
    const subtotal = item.precio * item.cantidad;
    suma += subtotal;

    lista.innerHTML += `
      <li>
        ${item.nombre} x ${item.cantidad}
        <button onclick="cambiarCantidad(${index}, -1)">-</button>
        <button onclick="cambiarCantidad(${index}, 1)">+</button>    
      </li>
    `;
  });

  total.textContent = suma.toFixed(2);
}

function cambiarCantidad(index, cambio) {
  carrito[index].cantidad += cambio;

  if (carrito[index].cantidad <= 0) {
    carrito.splice(index, 1);
  }

  actualizarCarrito();
}

function vaciarCarrito() {
  carrito = [];
  actualizarCarrito();
}

cargarProductos();
</script>

</body>
</html>
