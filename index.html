<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Tienda Supabase</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .producto { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; }
    img { max-width: 100%; height: auto; }
    button { margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Mini Tienda</h1>
  <div id="productos"></div>

  <script type="module">
    import { obtenerProductos } from './supabase.js';

    async function mostrarProductos() {
      const productos = await obtenerProductos();
      const contenedor = document.getElementById('productos');

      productos.forEach(producto => {
        const div = document.createElement('div');
        div.className = 'producto';
        div.innerHTML = `
          <h3>${producto.nombre}</h3>
          <img src="${producto.imagen_url}" alt="${producto.nombre}">
          <p>${producto.descripcion}</p>
          <p>Precio: $${producto.precio}</p>
          <button onclick="alert('Seleccionaste: ${producto.nombre} - Precio: $${producto.precio}')">Comprar</button>
        `;
        contenedor.appendChild(div);
      });
    }

    mostrarProductos();
  </script>
</body>
</html>
